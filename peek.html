<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PeekScreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        #main-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        #realtime-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            filter: invert(1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        #result-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            background: #000000;
            align-items: center;
            justify-content: center;
            padding: 32px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #result-view.active {
            display: flex;
            opacity: 1;
        }

        #result-text {
            font-size: 18px;
            line-height: 1.6;
            color: #f1f3f5;
            max-width: 85%;
            display: none;
            text-align: left;
        }

        #result-text p {
            margin: 0 0 12px 0;
        }

        #result-text ul {
            margin: 0 0 12px 0;
            padding-left: 24px;
        }

        #result-text li {
            margin-bottom: 8px;
        }

        #result-text strong {
            font-weight: 700;
            color: #ffffff;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: none;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: pulse-anim 1.5s infinite ease-in-out;
        }

        @keyframes pulse-anim {
            0% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.3; }
        }

        #debug-console {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 200px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            z-index: 105;
            padding: 16px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 11px;
            line-height: 1.5;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .log-entry {
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }

        .log-system { color: #888888; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }

        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #settings-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #111111;
            width: 100%;
            padding: 32px 24px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            border-top: 1px solid #222222;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        #settings-modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 24px 0;
            color: #ffffff;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-control {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }

        .input-control:focus {
            border-color: #555555;
        }

        select.input-control {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 12px;
        }

        .btn-save:active {
            background: #e9ecef;
        }

        #toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #222222;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="main-view">
        <img id="realtime-image" src="" alt="">
    </div>

    <div id="debug-console"></div>

    <div id="loader">
        <div class="pulse"></div>
    </div>

    <div id="result-view">
        <div id="result-text"></div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 class="modal-title">Pengaturan</h2>
            
            <div class="input-group">
                <label>API Key</label>
                <input type="password" id="input-apikey" class="input-control" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Mode</label>
                <select id="input-mode" class="input-control">
                    <option value="text">Analisa Teks</option>
                    <option value="image">Tampilkan Sketsa</option>
                </select>
            </div>

            <div id="ai-settings-group">
                <div class="input-group">
                    <label>Model Analisa</label>
                    <input type="text" id="input-model" class="input-control" autocomplete="off" placeholder="gemini-1.5-flash">
                </div>

                <div class="input-group">
                    <label>Prompt Analisa</label>
                    <input type="text" id="input-prompt" class="input-control" autocomplete="off" placeholder="Jelaskan secara singkat...">
                </div>
            </div>

            <button class="btn-save" id="btn-save">Simpan</button>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsu91cGiUlZcM7bGfGLNklykH7QtG0NTw",
            authDomain: "drawbyheri.firebaseapp.com",
            databaseURL: "https://drawbyheri-default-rtdb.firebaseio.com",
            projectId: "drawbyheri",
            storageBucket: "drawbyheri.firebasestorage.app",
            messagingSenderId: "287164271284",
            appId: "1:287164271284:web:9eb8f29ea79d7e4e10e5e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const debugConsole = document.getElementById('debug-console');
        const realtimeImage = document.getElementById('realtime-image');
        const resultView = document.getElementById('result-view');
        const resultText = document.getElementById('result-text');
        const loader = document.getElementById('loader');
        const settingsModal = document.getElementById('settings-modal');
        const toast = document.getElementById('toast');

        const inputApiKey = document.getElementById('input-apikey');
        const inputMode = document.getElementById('input-mode');
        const inputModel = document.getElementById('input-model');
        const inputPrompt = document.getElementById('input-prompt');
        const aiSettingsGroup = document.getElementById('ai-settings-group');
        const btnSave = document.getElementById('btn-save');

        let currentBase64Image = null;
        let isProcessing = false;

        function appendLog(message, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            entry.textContent = `[${time}] ${message}`;
            debugConsole.appendChild(entry);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadSettings() {
            inputApiKey.value = localStorage.getItem('ps_apikey') || '';
            inputMode.value = localStorage.getItem('ps_mode') || 'text';
            inputModel.value = localStorage.getItem('ps_model') || 'gemini-1.5-flash';
            inputPrompt.value = localStorage.getItem('ps_prompt') || 'Jelaskan gambar ini sangat singkat saja. Pisahkan elemen yang berbeda ke dalam bentuk daftar poin. Langsung ke intinya.';
            toggleSettingsVisibility();
            applyModeBehavior();
            appendLog('Aplikasi dimulai. Pengaturan dimuat.', 'system');
        }

        function toggleSettingsVisibility() {
            if (inputMode.value === 'text') {
                aiSettingsGroup.style.display = 'block';
            } else {
                aiSettingsGroup.style.display = 'none';
            }
        }

        function applyModeBehavior() {
            const mode = localStorage.getItem('ps_mode') || 'text';
            if (mode === 'image') {
                realtimeImage.style.display = 'block';
                resultView.classList.remove('active');
            } else {
                realtimeImage.style.display = 'none';
            }
        }

        inputMode.addEventListener('change', toggleSettingsVisibility);

        debugConsole.addEventListener('touchend', (e) => {
            e.stopPropagation();
        });

        let tapCount = 0;
        let tapTimeout;
        
        window.addEventListener('touchend', (e) => {
            if (settingsModal.classList.contains('active') || isProcessing) return;
            
            tapCount++;
            
            if (tapCount === 1) {
                tapTimeout = setTimeout(() => {
                    tapCount = 0;
                }, 400);
            } else if (tapCount === 2) {
                clearTimeout(tapTimeout);
                tapTimeout = setTimeout(() => {
                    const mode = localStorage.getItem('ps_mode') || 'text';
                    if (mode === 'text') {
                        processData();
                    }
                    tapCount = 0;
                }, 250);
            } else if (tapCount === 3) {
                clearTimeout(tapTimeout);
                settingsModal.classList.add('active');
                tapCount = 0;
            }
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });

        resultView.addEventListener('click', () => {
            if (!isProcessing) {
                resultView.classList.remove('active');
                setTimeout(() => {
                    resultText.style.display = 'none';
                    resultText.innerHTML = '';
                }, 400);
            }
        });

        btnSave.addEventListener('click', () => {
            localStorage.setItem('ps_apikey', inputApiKey.value.trim());
            localStorage.setItem('ps_mode', inputMode.value);
            localStorage.setItem('ps_model', inputModel.value.trim());
            localStorage.setItem('ps_prompt', inputPrompt.value.trim());
            settingsModal.classList.remove('active');
            showToast('Pengaturan disimpan');
            appendLog('Pengaturan disimpan oleh pengguna.', 'info');
            applyModeBehavior();
            
            if (inputMode.value === 'image' && currentBase64Image) {
                realtimeImage.src = currentBase64Image;
            }
        });

        const screenRef = ref(db, 'magic_sync/current_canvas');
        onValue(screenRef, (snapshot) => {
            const data = snapshot.val();
            let newImage = null;
            
            if (data && data.base64) {
                newImage = data.base64;
                appendLog('Pembaruan gambar dari Firebase.', 'info');
            } else if (data && data.imageData) {
                newImage = data.imageData;
                appendLog('Pembaruan gambar dari Firebase.', 'info');
            }

            if (newImage) {
                currentBase64Image = newImage;
                const mode = localStorage.getItem('ps_mode') || 'text';
                if (mode === 'image') {
                    realtimeImage.src = currentBase64Image;
                }
            }
        });

        function formatMarkdown(text) {
            let processedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                                    .replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            
            let lines = processedText.split('\n');
            let finalHtml = '';
            let inList = false;

            lines.forEach(line => {
                let trimmed = line.trim();
                if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
                    if (!inList) {
                        finalHtml += '<ul>';
                        inList = true;
                    }
                    finalHtml += `<li>${trimmed.substring(2).trim()}</li>`;
                } else if (trimmed !== '') {
                    if (inList) {
                        finalHtml += '</ul>';
                        inList = false;
                    }
                    finalHtml += `<p>${trimmed}</p>`;
                }
            });

            if (inList) {
                finalHtml += '</ul>';
            }

            return finalHtml;
        }

        async function processData() {
            if (!currentBase64Image) {
                appendLog('Proses dibatalkan: Belum ada gambar dari Firebase.', 'error');
                return;
            }
            if (isProcessing) return;

            const apiKey = localStorage.getItem('ps_apikey');
            const model = localStorage.getItem('ps_model') || 'gemini-1.5-flash';
            const promptText = localStorage.getItem('ps_prompt') || 'Jelaskan gambar ini.';

            if (!apiKey) {
                showToast('API Key belum diatur');
                appendLog('Proses dibatalkan: API Key belum diatur.', 'error');
                return;
            }

            isProcessing = true;
            loader.style.display = 'block';
            resultView.classList.remove('active');
            resultText.style.display = 'none';
            resultText.innerHTML = '';

            appendLog(`Meminta analisa teks ke ${model}...`, 'info');

            try {
                const cleanBase64 = currentBase64Image.replace(/^data:image\/(png|jpeg|jpg);base64,/, "");
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{
                        parts: [
                            { text: promptText },
                            {
                                inlineData: {
                                    mimeType: "image/jpeg",
                                    data: cleanBase64
                                }
                            }
                        ]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resData = await response.json();
                
                if (!response.ok) {
                    appendLog(`Error API: ${JSON.stringify(resData)}`, 'error');
                    throw new Error(resData.error?.message || 'Gagal memproses ke Gemini');
                }

                appendLog(`Analisa sukses diterima.`, 'success');

                const rawText = resData.candidates[0].content.parts[0].text;
                resultText.innerHTML = formatMarkdown(rawText);
                resultText.style.display = 'block';
                resultView.classList.add('active');

            } catch (error) {
                appendLog(`Catch Error: ${error.message}`, 'error');
                showToast(`Gagal: ${error.message}`);
            } finally {
                isProcessing = false;
                loader.style.display = 'none';
            }
        }

        loadSettings();
    </script>
</body>
</html>
