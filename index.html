<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Workspace</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        input, textarea, select {
            -webkit-user-select: auto;
            user-select: auto;
        }
        
        #canvas-container {
            width: 100%;
            height: calc(100% - 60px);
            position: absolute;
            top: 0;
            left: 0;
            background: #ffffff;
            z-index: 1;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #bottom-toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #f2f2f7;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 100;
            border-top: 1px solid #e5e5ea;
        }

        .tool-btn {
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s;
        }

        .tool-btn:active {
            opacity: 0.5;
        }

        .tool-btn svg {
            width: 24px;
            height: 24px;
            stroke: #1c1c1e;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tool-btn.active svg {
            stroke: #007aff;
        }

        .color-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .color-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #007aff;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
            pointer-events: none;
            transition: box-shadow 0.2s;
        }

        .color-circle.ready {
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1), 0 0 0 2px #1c1c1e;
        }

        #color-picker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        #settings-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            background: #ffffff;
            width: 85%;
            max-width: 340px;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transform: scale(0.95);
            transition: transform 0.2s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        #settings-modal.active .modal-card {
            transform: scale(1);
        }

        .modal-title {
            margin: 0 0 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: #1c1c1e;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #6c6c70;
            margin-bottom: 6px;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            font-size: 15px;
            color: #1c1c1e;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            background: #ffffff;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231c1c1e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: #007aff;
        }

        .response-box {
            padding: 10px 12px;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            font-size: 14px;
            color: #1c1c1e;
            background: #f9f9f9;
            min-height: 40px;
            word-wrap: break-word;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-cancel {
            background: #f2f2f7;
            color: #1c1c1e;
        }

        .btn-save {
            background: #007aff;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="bottom-toolbar">
        <div class="color-wrapper">
            <input type="color" id="color-picker" value="#007aff">
            <div class="color-circle" id="color-display"></div>
        </div>

        <button class="tool-btn active" id="btn-pen">
            <svg viewBox="0 0 24 24">
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btn-brush">
            <svg viewBox="0 0 24 24">
                <path d="M18 2l4 4-10 10-4-4L18 2z"></path>
                <path d="M2 22v-4l4-4 4 4-4 4H2z" fill="#1c1c1e" stroke="none"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btn-text">
            <svg viewBox="0 0 24 24">
                <path d="M4 20h16"></path>
                <path d="M12 4l-6 12"></path>
                <path d="M12 4l6 12"></path>
                <path d="M8 12h8"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btn-clear">
            <svg viewBox="0 0 24 24">
                <path d="M3 6h18"></path>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btn-undo">
            <svg viewBox="0 0 24 24">
                <path d="M3 7v6h6"></path>
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btn-download">
            <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        </button>
    </div>

    <div id="settings-modal">
        <div class="modal-card">
            <h3 class="modal-title">Pengaturan</h3>
            <div class="input-group">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key">
            </div>
            <div class="input-group">
                <label for="ai-model">Model</label>
                <input type="text" id="ai-model" value="gemini-2.5-flash">
            </div>
            <div class="input-group">
                <label for="ai-language">Bahasa Respon</label>
                <select id="ai-language">
                    <option value="Indonesian">Indonesia</option>
                    <option value="English">Inggris</option>
                    <option value="Japanese">Jepang</option>
                    <option value="Spanish">Spanyol</option>
                    <option value="French">Prancis</option>
                    <option value="German">Jerman</option>
                    <option value="Korean">Korea</option>
                    <option value="Chinese (Simplified)">Mandarin</option>
                    <option value="Arabic">Arab</option>
                    <option value="Russian">Rusia</option>
                    <option value="Portuguese">Portugis</option>
                    <option value="Italian">Italia</option>
                </select>
            </div>
            <div class="input-group">
                <label for="ai-prompt">Prompt</label>
                <textarea id="ai-prompt"></textarea>
            </div>
            <div class="input-group">
                <label for="ai-delay">Waktu Tunggu</label>
                <input type="number" id="ai-delay" min="1" max="60" value="3">
            </div>
            <div class="input-group">
                <label for="ai-inject">Inject ID</label>
                <input type="text" id="ai-inject">
            </div>
            <div class="input-group">
                <label>Respon Terakhir</label>
                <div id="ai-last-response" class="response-box">Belum ada respon</div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" id="btn-close-modal">Batal</button>
                <button class="btn-modal btn-save" id="btn-save-settings">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        const colorDisplay = document.getElementById('color-display');

        let isDrawing = false;
        let currentMode = 'pen';
        let currentColor = '#007aff';
        let strokeHistory = [];
        let aiTimer = null;
        let aiResponseReady = false;
        let latestAiResponse = '';
        let inputStartPos = null;
        let inputStartTime = 0;
        let hasMoved = false;
        let emptyCanvasState = '';
        let lastSubmittedState = '';

        function formatItemName(str) {
            if (!str) return "";
            return str.toLowerCase().split(' ').map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        }

        function fillWhiteBackground() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            emptyCanvasState = canvas.toDataURL('image/jpeg', 0.8);
        }

        function resizeCanvas() {
            let tempState = null;
            if (canvas.width > 0 && canvas.height > 0) {
                tempState = canvas.toDataURL();
            }
            
            canvas.width = canvasContainer.clientWidth;
            canvas.height = canvasContainer.clientHeight;
            
            fillWhiteBackground();
            strokeHistory = [];

            if (tempState) {
                let img = new Image();
                img.src = tempState;
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function saveHistoryState() {
            strokeHistory.push(canvas.toDataURL());
            if (strokeHistory.length > 20) {
                strokeHistory.shift();
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.changedTouches && e.changedTouches.length > 0) {
                return { 
                    x: e.changedTouches[0].clientX - rect.left, 
                    y: e.changedTouches[0].clientY - rect.top 
                };
            } else if (e.touches && e.touches.length > 0) {
                return { 
                    x: e.touches[0].clientX - rect.left, 
                    y: e.touches[0].clientY - rect.top 
                };
            }
            return { 
                x: e.clientX - rect.left, 
                y: e.clientY - rect.top 
            };
        }

        function setAiReadyState(isReady, text = '', isSuccess = false) {
            aiResponseReady = isReady;
            latestAiResponse = text;
            if (isReady) {
                colorDisplay.classList.add('ready');
                
                if (isSuccess && text) {
                    const injectId = localStorage.getItem('geminiInjectVal');
                    if (injectId) {
                        const formattedValue = formatItemName(text.trim());
                        fetch(`https://11z.co/_w/${injectId}/selection`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ source: 'Google', value: formattedValue })
                        }).catch(() => {});
                    }
                }
            } else {
                colorDisplay.classList.remove('ready');
            }
        }

        function getImageDataFromBase64(base64) {
            return new Promise(resolve => {
                let img = new Image();
                img.onload = () => {
                    let tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 64;
                    tempCanvas.height = 64;
                    let tCtx = tempCanvas.getContext('2d');
                    tCtx.drawImage(img, 0, 0, 64, 64);
                    resolve(tCtx.getImageData(0, 0, 64, 64).data);
                };
                img.onerror = () => resolve(false);
                img.src = base64;
            });
        }

        async function isSimilar(base64_1, base64_2) {
            if (!base64_1 || !base64_2) return false;
            if (base64_1 === base64_2) return true;

            let data1 = await getImageDataFromBase64(base64_1);
            let data2 = await getImageDataFromBase64(base64_2);
            
            if (!data1 || !data2) return false;

            let diff = 0;
            for (let i = 0; i < data1.length; i += 4) {
                let r = Math.abs(data1[i] - data2[i]);
                let g = Math.abs(data1[i+1] - data2[i+1]);
                let b = Math.abs(data1[i+2] - data2[i+2]);
                if (r > 15 || g > 15 || b > 15) diff++;
            }
            
            let totalPixels = 64 * 64;
            let diffPercent = diff / totalPixels;
            return diffPercent < 0.05;
        }

        async function processWithGemini() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) return;

            const currentBase64 = canvas.toDataURL('image/jpeg', 0.8);
            
            if (currentBase64 === emptyCanvasState) {
                return;
            }

            if (lastSubmittedState) {
                const similar = await isSimilar(currentBase64, lastSubmittedState);
                if (similar) return;
            }

            const model = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
            let userPrompt = localStorage.getItem('geminiPrompt') || 'Jelaskan isi gambar';
            const targetLang = localStorage.getItem('geminiLanguage') || 'Indonesian';
            
            const rigidInstruction = "just give the answer, don't give any other explanation. Also don't use \"a\", \"the\", etc in front of the answer.";
            const langInstruction = `Please provide the final answer strictly in ${targetLang} language.`;
            const finalPrompt = userPrompt + "\n\n" + rigidInstruction + "\n\n" + langInstruction;

            const base64Image = currentBase64.split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: finalPrompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    setAiReadyState(true, data.error.message, false);
                    lastSubmittedState = '';
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    setAiReadyState(true, data.candidates[0].content.parts[0].text, true);
                    lastSubmittedState = currentBase64;
                } else {
                    setAiReadyState(true, "Respon kosong", false);
                    lastSubmittedState = '';
                }
            } catch (err) {
                setAiReadyState(true, "Koneksi bermasalah", false);
                lastSubmittedState = '';
            }
        }

        function clearAiTimer() {
            clearTimeout(aiTimer);
            setAiReadyState(false);
        }

        function startAiTimer() {
            clearTimeout(aiTimer);
            const delayStr = localStorage.getItem('geminiDelay') || '3';
            const delay = parseFloat(delayStr) * 1000;
            aiTimer = setTimeout(processWithGemini, delay);
        }

        function handleInputStart(e) {
            if (currentMode === 'text') return;
            if (e.cancelable) e.preventDefault();
            
            saveHistoryState();
            inputStartPos = getPos(e);
            inputStartTime = Date.now();
            hasMoved = false;
            
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(inputStartPos.x, inputStartPos.y);
        }

        function draw(e) {
            if (!isDrawing || currentMode === 'text') return;
            
            const pos = getPos(e);
            
            if (!hasMoved) {
                const dx = Math.abs(pos.x - inputStartPos.x);
                const dy = Math.abs(pos.y - inputStartPos.y);
                if (dx > 5 || dy > 5) {
                    hasMoved = true;
                    clearAiTimer();
                } else {
                    return;
                }
            }
            
            if (e.cancelable) e.preventDefault();
            ctx.lineWidth = currentMode === 'brush' ? 12 : 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = currentColor;
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function handleInputEnd(e) {
            if (!isDrawing) return;
            
            if (e.cancelable) e.preventDefault();
            isDrawing = false;
            ctx.closePath();
            
            if (hasMoved) {
                startAiTimer();
            }
        }

        canvas.addEventListener('mousedown', handleInputStart);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', handleInputEnd);
        canvas.addEventListener('mouseout', handleInputEnd);

        canvas.addEventListener('touchstart', handleInputStart, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', handleInputEnd, { passive: false });
        canvas.addEventListener('touchcancel', handleInputEnd, { passive: false });

        const bottomToolbar = document.getElementById('bottom-toolbar');
        const stopPropagation = (e) => e.stopPropagation();
        
        bottomToolbar.addEventListener('touchstart', stopPropagation, { passive: true });
        bottomToolbar.addEventListener('mousedown', stopPropagation);

        const btnPen = document.getElementById('btn-pen');
        const btnBrush = document.getElementById('btn-brush');
        const btnText = document.getElementById('btn-text');
        const colorPicker = document.getElementById('color-picker');

        function updateToolUI(activeBtn, mode) {
            btnPen.classList.remove('active');
            btnBrush.classList.remove('active');
            btnText.classList.remove('active');
            activeBtn.classList.add('active');
            currentMode = mode;
        }

        btnPen.addEventListener('click', () => updateToolUI(btnPen, 'pen'));
        btnBrush.addEventListener('click', () => updateToolUI(btnBrush, 'brush'));
        
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            colorDisplay.style.backgroundColor = currentColor;
        });

        colorPicker.addEventListener('change', (e) => {
            if (currentMode === 'text') {
                updateToolUI(btnPen, 'pen');
            }
        });

        document.getElementById('btn-undo').addEventListener('click', () => {
            if (strokeHistory.length > 0) {
                clearAiTimer();
                let lastState = strokeHistory.pop();
                let img = new Image();
                img.src = lastState;
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    fillWhiteBackground();
                    ctx.drawImage(img, 0, 0);
                    startAiTimer();
                }
            }
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            clearAiTimer();
            saveHistoryState();
            fillWhiteBackground();
            lastSubmittedState = '';
            startAiTimer();
        });

        document.getElementById('btn-download').addEventListener('click', function() {
            this.style.opacity = '0.5';
            setTimeout(() => this.style.opacity = '1', 200);
            
            const link = document.createElement('a');
            link.download = 'Export.jpeg';
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        });

        const modal = document.getElementById('settings-modal');
        const inputApiKey = document.getElementById('api-key');
        const inputModel = document.getElementById('ai-model');
        const inputLanguage = document.getElementById('ai-language');
        const inputPrompt = document.getElementById('ai-prompt');
        const inputDelay = document.getElementById('ai-delay');
        const inputInject = document.getElementById('ai-inject');
        const lastResponseBox = document.getElementById('ai-last-response');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const btnSaveSettings = document.getElementById('btn-save-settings');

        function loadSettings() {
            inputApiKey.value = localStorage.getItem('geminiApiKey') || '';
            inputModel.value = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
            inputLanguage.value = localStorage.getItem('geminiLanguage') || 'Indonesian';
            inputPrompt.value = localStorage.getItem('geminiPrompt') || '';
            inputDelay.value = localStorage.getItem('geminiDelay') || '3';
            inputInject.value = localStorage.getItem('geminiInjectVal') || '';
            lastResponseBox.textContent = latestAiResponse || 'Belum ada respon';
        }

        function saveSettings() {
            localStorage.setItem('geminiApiKey', inputApiKey.value.trim());
            
            let modelVal = inputModel.value.trim();
            if (!modelVal) modelVal = 'gemini-2.5-flash';
            localStorage.setItem('geminiModel', modelVal);
            
            localStorage.setItem('geminiLanguage', inputLanguage.value);
            localStorage.setItem('geminiPrompt', inputPrompt.value.trim());
            localStorage.setItem('geminiDelay', inputDelay.value);
            localStorage.setItem('geminiInjectVal', inputInject.value.trim());
            
            modal.classList.remove('active');
            updateToolUI(btnPen, 'pen');
        }

        btnCloseModal.addEventListener('click', () => {
            modal.classList.remove('active');
            updateToolUI(btnPen, 'pen');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                updateToolUI(btnPen, 'pen');
            }
        });

        btnSaveSettings.addEventListener('click', saveSettings);

        let pressTimer;
        
        function handlePressStart(e) {
            pressTimer = setTimeout(() => {
                updateToolUI(btnText, 'text');
                loadSettings();
                modal.classList.add('active');
            }, 500);
        }

        function handlePressEnd() {
            clearTimeout(pressTimer);
        }

        btnText.addEventListener('mousedown', handlePressStart);
        btnText.addEventListener('touchstart', handlePressStart, { passive: true });
        btnText.addEventListener('mouseup', handlePressEnd);
        btnText.addEventListener('mouseleave', handlePressEnd);
        btnText.addEventListener('touchend', handlePressEnd);
        btnText.addEventListener('touchcancel', handlePressEnd);

        loadSettings();
    </script>
</body>
</html>
